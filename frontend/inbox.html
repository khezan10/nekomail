<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nekomail - Temporary Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Mengaktifkan dark mode berbasis class
            theme: {
                extend: {
                    colors: {
                        neko: '#ff901a',       // Warna oranye utama
                        nekohigh: '#e67e12'    // Warna oranye gelap (untuk efek hover)
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans min-h-screen transition-colors duration-300">

    <nav class="bg-neko text-white p-4 shadow-md transition-colors duration-300">
        <div class="container mx-auto flex justify-between items-center max-w-4xl">
            <div class="flex items-center">
                <svg class="w-8 h-8 mr-3 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 14.5c-1.5 0-2.5-.5-2.5-.5s1-1.5 2.5-1.5 2.5 1.5 2.5 1.5-1 .5-2.5.5z"/>
                    <path d="M20.5 4.5l-1.4 6.3a8.5 8.5 0 0 1-14.2 0L3.5 4.5l5.2 3.5a8.5 8.5 0 0 1 6.6 0l5.2-3.5zM12 21a8.5 8.5 0 0 0 6.5-3.3A8.48 8.48 0 0 1 12 19a8.48 8.48 0 0 1-6.5-1.3A8.5 8.5 0 0 0 12 21z"/>
                </svg>
                <h1 class="text-2xl font-bold">Nekomail</h1>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-white hover:bg-opacity-20 transition focus:outline-none">
                    <i id="icon-light" class="fa-solid fa-sun text-xl hidden"></i>
                    <i id="icon-dark" class="fa-solid fa-moon text-xl hidden"></i>
                </button>
                <button onclick="logoutNekomail()" class="p-2 rounded hover:bg-white hover:bg-opacity-20 transition focus:outline-none flex items-center font-semibold text-sm">
                    <i class="fa-solid fa-right-from-bracket mr-2"></i>Keluar
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-4 max-w-4xl">
        
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6 text-center transition-colors duration-300">
            <h2 class="text-xl font-semibold mb-4 dark:text-white">Alamat Email Sementara Kamu</h2>
            
            <div class="flex flex-col sm:flex-row justify-center items-center gap-2">
                <input type="text" id="email-address" readonly 
                    class="w-full sm:w-2/3 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-lg rounded-lg block p-3 text-center focus:ring-neko focus:border-neko outline-none transition-colors" 
                    value="Memuat...">
                
                <button onclick="copyToClipboard()" class="w-full sm:w-auto bg-neko hover:bg-nekohigh text-white font-bold py-3 px-6 rounded-lg transition duration-200">
                    <i class="fa-solid fa-copy mr-2"></i>Copy
                </button>
                <button onclick="changeEmail()" class="w-full sm:w-auto bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-white font-bold py-3 px-6 rounded-lg transition duration-200">
                    <i class="fa-solid fa-rotate mr-2"></i>Random
                </button>
            </div>
            <p id="copy-status" class="text-green-500 text-sm mt-2 hidden">Meow! Alamat berhasil disalin.</p>

            <div class="mt-6 pt-4 border-t border-gray-200 dark:border-gray-700 flex flex-col sm:flex-row justify-center items-center gap-2 transition-colors">
                <input type="text" id="custom-username" placeholder="Ketik nama (contoh: meow123)" 
                    class="w-full sm:w-1/3 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white rounded-lg p-2 text-center focus:ring-neko focus:border-neko outline-none transition-colors">
                
                <span id="domain-label" class="text-gray-500 dark:text-gray-400 font-semibold py-2">@domainkamu.com</span>
                
                <button onclick="setCustomEmail()" class="w-full sm:w-auto bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                    <i class="fa-solid fa-pen-to-square mr-2"></i>Buat Custom
                </button>
            </div>
        </div>

        <div class="mt-8 bg-white dark:bg-gray-800 rounded-lg shadow-lg overflow-hidden transition-colors duration-300">
            <div class="bg-gray-50 dark:bg-gray-900 p-4 border-b dark:border-gray-700 flex justify-between items-center transition-colors">
                <h3 class="font-bold text-lg dark:text-white"><i class="fa-solid fa-inbox mr-2 text-neko"></i>Kotak Masuk</h3>
                <div class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400">
                    <i class="fa-solid fa-spinner fa-spin hidden" id="loading-spinner"></i>
                    <span id="refresh-status">Menunggu email baru...</span>
                </div>
            </div>
            
            <div id="inbox-list" class="divide-y divide-gray-200 dark:divide-gray-700 max-h-96 overflow-y-auto">
                <div class="p-8 text-center text-gray-500 dark:text-gray-400">
                    Kotak masuk masih kosong. Meow~
                </div>
            </div>
        </div>

        <div id="email-viewer" class="mt-8 bg-white dark:bg-gray-800 rounded-lg shadow-lg overflow-hidden hidden transition-colors duration-300">
            <div class="bg-gray-50 dark:bg-gray-900 p-4 border-b dark:border-gray-700 flex justify-between items-center">
                <h3 class="font-bold text-lg dark:text-white">Membaca Pesan</h3>
                <button onclick="closeEmailViewer()" class="text-gray-500 hover:text-red-500 dark:text-gray-400 dark:hover:text-red-400"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6">
                <h2 id="view-subject" class="text-2xl font-bold mb-2 dark:text-white">Subjek</h2>
                <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">Dari: <span id="view-sender" class="font-semibold text-gray-800 dark:text-gray-200"></span></p>
                <hr class="mb-4 border-gray-200 dark:border-gray-700">
                <iframe id="view-body" class="w-full h-96 border-none bg-white rounded" sandbox="allow-same-origin"></iframe>
            </div>
        </div>

    </main>

    <script src="/static/app.js?v=2" defer></script>
    
    <script>
        async function logoutNekomail() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.reload(); // Reload halaman untuk kembali ke menu login
            } catch (error) {
                console.error("Gagal logout:", error);
                alert("Terjadi kesalahan saat logout.");
            }
        }
    </script>
</body>
</html>
